version: '3.8'
services:
  db:
    image: postgres:15
    container_name: pdi_postgres_lab
    restart: always
    environment:
      POSTGRES_USER: pdi_user
      POSTGRES_PASSWORD: pdi_password
      POSTGRES_DB: pdi_digital
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
